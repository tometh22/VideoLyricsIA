# Railway project config.
#
# Why this file exists:
#   The Worker service generates videos by polling Veo for 60-120 s per
#   job. When Railway redeploys (push to main, manual restart, platform
#   maintenance) the running container gets SIGTERM → SIGKILL. If KILL
#   fires before the in-flight job has a chance to finish or be
#   re-queued, the user sees a forever-spinning "Generando" until the
#   reaper sweeps the row 10-100 min later.
#
#   This config tightens the three knobs that turn that incident into a
#   non-event:
#     • healthcheckTimeout — Railway holds the old replica around until
#       the new one is healthy (rolling overlap).
#     • restartPolicy      — restart loops are bounded; a real bug stops
#       eating users instead of hot-looping forever.
#     • Per-service deploy settings live in each service's section, so
#       the Worker can have a different graceful-shutdown budget than
#       the API.
#
# What you still need to verify in the Railway dashboard:
#   1. Plan tier supports overlapping deploys (Pro plan and above).
#      Hobby plan does the "kill-then-spawn" sequence regardless of
#      this file.
#   2. `RAILWAY_SHUTDOWN_TIMEOUT_SECONDS` env var is set to **1200** (20
#      min) on the Worker service.
#      ⚠️ 2026-05-15 INCIDENT: this var is NOT set on staging. Railway's
#      default 30 s SIGTERM→SIGKILL window killed in-flight UMG renders
#      on every deploy today. Apply manually via Railway dashboard →
#      Worker service → Variables before merging this PR, OR a deploy
#      will repeat the same outage. (railway.toml cannot set platform
#      env vars; this has to be a dashboard step.) This is the SIGTERM→SIGKILL grace
#      period; RQ workers honor SIGTERM by finishing the current job
#      (worker.py:_graceful), but Railway's default grace is 30 s which
#      cuts a Veo poll in half. A background edit can take ~15 min end-
#      to-end (Veo ~3 min + composite ~5-8 min + headroom), so 30 s ≈
#      guaranteed mid-render kill on every deploy. Set 1200 once in the
#      Worker service env and the SIGTERM path actually completes.
#      Even with this, the reaper.find_abandoned_edits sweep is the
#      belt-and-suspenders fallback if a worker DOES die: it reverts
#      status=editing rows back to pending_review at the 30-min mark
#      and restores edit_count so the user gets the failed attempt back.
#   3. Health check endpoints respond fast (< 1 s). The API exposes
#      /health; the worker has none and runs as a daemon — that's fine,
#      Railway just won't wait on it for the overlap window (see the
#      `[services.worker]` block below).

[build]
builder = "DOCKERFILE"

# --- Defaults aplicados a TODOS los servicios ---
#
# Solo lo que aplica a ambos (API + Worker). HEALTHCHECK NO va acá
# porque el Worker es un daemon RQ sin HTTP. Cuando estaba global
# Railway falló el deploy con "5/5 replicas never became healthy"
# porque el Worker nunca responde GET /health. Los settings de
# healthcheck ahora viven en [services.api.deploy].

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# --- API service (FastAPI on uvicorn) ---
#
# CRITICAL: el service name DEBE matchear exacto el nombre en Railway
# dashboard (case-sensitive). En Genly IA es `api` minúscula. Si lo
# escribís en mayúscula o con otro casing, Railway ignora silenciosamente
# el override y el servicio cae al [deploy] default sin healthcheck.

[services.api.deploy]
healthcheckPath = "/health"
# Cold-start budget. The API does a lot on boot:
#   • sentry init                            (~1-2 s)
#   • SQLAlchemy engine + first PG connect  (3-15 s, Railway PG cold)
#   • init_db()                              (table + column migrations,
#                                              1-5 s — runs in-process at
#                                              startup, see database.py)
#   • alembic schema validation              (no-op in prod; instant)
#   • reaper thread + outputs-cleanup thread (instant)
#   • Whisper model preload SKIPPED on api  (OPENAI_API_KEY set)
#
# Total p99 around 25 s, peak ~45 s when PG also needs to warm. 30 s
# was a coin-flip — one deploy on 2026-05-11 22:00 UTC failed 5/5
# replicas with "service unavailable" because /health returned 503 on
# the first hit (PG SELECT 1 inside health_snapshot tripped on a fresh
# pool that hadn't established its first socket yet). 90 s gives us
# 3× headroom over the observed peak without making genuinely broken
# deploys take forever to fail.
healthcheckTimeout = 90

# --- Worker service overrides ---
#
# CRITICAL: el service en Railway dashboard se llama `Worker` con W
# MAYÚSCULA. La versión anterior decía `worker` (lowercase) → no
# matcheaba → Railway aplicaba el [deploy] global con healthcheck
# /health → Worker no tiene HTTP → 5/5 replicas fail → deploy abortaba.
#
# No ponemos healthcheckPath acá: el Worker es daemon RQ. La resiliencia
# viene de SIGTERM handler (worker.py:_graceful drain in-flight) + RQ
# Retry en queue_jobs.py (auto-recover si el worker muere mid-job).

[services.Worker.deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Horizontal scale. UMG enterprise jobs run ~12-20 min each (Whisper +
# Veo + composite + ProRes encode + ~5 GB R2 upload). With 1 replica a
# batch of 5 UMG renders queues at ~80-100 min — the wait agus saw on
# 2026-05-15. 7 replicas covers the typical UMG batch (5-7 songs) in a
# single ~15-min wave, with 2 spare for concurrent /edit requests, and
# stays well below the Whisper / Veo upstream rate ceilings.
#
# RAM / vCPU math on Railway Pro: budget is 1 TB RAM / 1,000 vCPU per
# service, with each replica capped at 24 GB / 24 vCPU. ProRes encode
# peaks at ~5 GB (ffmpeg holds master + short), so we run with the
# default replica size — plenty of headroom for the Python heap +
# Whisper buffer + safety margin. 7 × 24 GB = 168 GB ceiling, far
# below the 1 TB service limit.
#
# Upstream rate-limit ceiling (the real bottleneck above ~10 replicas):
#   - OpenAI Whisper: ~50 req/min on current tier — 7 parallel workers
#     × ~3 req/job = peak ~21 req/min, safe.
#   - Veo 3: per-project quota; observed degradation past 10 concurrent.
#   - Gemini: 60 req/min standard tier.
# Past 10 replicas, jobs will 429 in cascade and the whisper-retry
# logic in pipeline.py (#145/#146) eats the slack but only buys
# minutes. To go higher, raise the OpenAI tier first.
#
# Keep `numReplicas` here in sync with the dashboard — Railway treats
# the file as source of truth and the next deploy would revert a
# dashboard-only bump back to this value.
numReplicas = 7
