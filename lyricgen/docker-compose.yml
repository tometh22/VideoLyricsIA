# ============================================================
# GenLy AI — Docker Compose (production-ready)
# ============================================================
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d --build
# ============================================================

services:

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: genly
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genly}
      POSTGRES_DB: genly
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genly"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis (rate limiting, future caching) ---
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- GenLy API + Frontend ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./backend/.env:/app/backend/.env:ro
    environment:
      DATABASE_URL: postgresql://genly:${POSTGRES_PASSWORD:-genly}@postgres:5432/genly
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-genly2026}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_100: ${STRIPE_PRICE_100:-}
      STRIPE_PRICE_250: ${STRIPE_PRICE_250:-}
      STRIPE_PRICE_500: ${STRIPE_PRICE_500:-}
      STRIPE_PRICE_1000: ${STRIPE_PRICE_1000:-}
      # Email
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-GenLy AI <noreply@genly.ai>}
      # AI services
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      VERTEX_PROJECT: ${VERTEX_PROJECT:-}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
      # Sentry
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENV: ${SENTRY_ENV:-production}
      # S3 Storage (optional)
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # --- Nginx reverse proxy ---
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # --- Database backup (daily at 3 AM) ---
  backup:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: genly
      PGPASSWORD: ${POSTGRES_PASSWORD:-genly}
      PGDATABASE: genly
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "
        pg_dump -h $$PGHOST -p $$PGPORT -U $$PGUSER $$PGDATABASE
          --no-owner --no-privileges --clean --if-exists
          | gzip > /backups/genly_backup_$$(date +%Y%m%d_%H%M%S).sql.gz
        && echo 'Backup complete'
        && find /backups -name 'genly_backup_*.sql.gz' -mtime +30 -delete
      "
    profiles:
      - backup

volumes:
  pgdata:
