<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <rect width="256" height="256" fill="#000000"/>
  <defs>
    <linearGradient id="gGrad" x1="62" y1="28" x2="200" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5845E5"/>
      <stop offset="100%" stop-color="#7C32E8"/>
    </linearGradient>
  </defs>
  <!--
    G shape — center (128,128), outer R=96, inner r=60.
    Gap opens at the right side. Top of gap at -28° on the outer arc.
    Crossbar: outer-right (224,128) down to (224,163), left to (148,163),
    up to (148,128), right to inner-right (188,128).
    Inner arc closes back to inner top of gap (181,100).
  -->
  <path d="M 213,83
           A 96,96 0 1,0 224,128
           L 224,163
           L 148,163
           L 148,128
           L 188,128
           A 60,60 0 1,1 181,100
           Z"
        fill="url(#gGrad)"/>
  <!-- Teal accent pill — sits at the inner shelf of the crossbar -->
  <rect x="122" y="141" width="50" height="14" rx="7" fill="#14C8A8"/>
</svg>
