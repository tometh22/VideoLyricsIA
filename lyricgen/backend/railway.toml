# Railway service configuration for the GenLy backend.
#
# Two Railway services share this directory:
#   - api    → uvicorn main:app on port 8000 (HTTP)
#   - worker → python worker.py (RQ, no HTTP listener)
#
# `healthcheckPath` only kicks in when a service exposes an HTTP port,
# so the worker silently ignores it (Railway skips the probe when there
# is no port). The api gets restarted automatically if /health flips
# to 5xx for `healthcheckTimeout` seconds in a row.
#
# /health now reports DB + Redis + R2 + queue depth + workers alive
# (see observability.py:health_snapshot), so a restart fires on real
# infrastructure issues, not just process death.

[deploy]
# Endpoint Railway probes. Configured in main.py:234 — public, no auth,
# returns 200 with status="ok" / "degraded", 5xx only on hard failure.
healthcheckPath = "/health"

# How long the endpoint can be unhealthy before Railway concludes the
# service is dead and recycles it. 30 s is enough to cover a slow boot
# + the first DB/Redis ping; longer gives transient blips room to
# self-heal without a restart.
healthcheckTimeout = 30

# Restart on crash up to N times before backing off. Railway's default
# is "on_failure" with no cap, which can mask a deploy that's broken
# in a way that keeps crashing forever — capping at 10 makes the loop
# obvious in the dashboard.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
