name: CI

on:
  push:
    branches: [main, claude/*]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend tests ───
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lyricgen/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: lyricgen/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///test.db"
          JWT_SECRET: "ci-test-secret-key"
          ADMIN_PASSWORD: "testadmin123"
        run: python -m pytest tests/ -v --tb=short

      - name: Syntax check all modules
        run: |
          python -c "
          import ast, glob
          for f in glob.glob('*.py'):
              ast.parse(open(f).read())
              print(f'{f}: OK')
          "

  # ─── Frontend build ───
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lyricgen/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: lyricgen/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ─── Docker build ───
  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          cd lyricgen
          docker build -t genly-ai:${{ github.sha }} .

      # Uncomment when you have a container registry:
      # - name: Login to registry
      #   uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
